test_batch_size: 32
dataset: wn18rr
task: all
DirectAUKG:
  optimizer: Adagrad
  learning_rate: 0.01
  dim: 50
  gamma: 0.0
  encoder_name: sentence-transformers/all-MiniLM-L6-v2
  max_length: 16
  encode_batch_size: 16
  compose_mode: add
  n_epoch: 1
  n_batch: 16
  grad_accum_steps: 1
  amp: true
  amp_dtype: fp16
  gradient_checkpointing: true
  freeze_embeddings: false
  freeze_lower_layers: 8
  freeze_tail_encoder: true
  uniformity_max_samples: 32
  uniformity_chunk_size: 64
  forward_chunk_size: 32768
  epoch_per_test: 1
  model_file: DirectAUKG_quick.mdl
TransE:
  optimizer: Adagrad
  learning_rate: 0.01
  dim: 50
  margin: 3
  p: 1
  temp: 1
  n_epoch: 1
  n_batch: 8
  epoch_per_test: 10
  model_file: TransE_quick.mdl
log:
  dump_config: false
  to_file: true
  dir: ./log
  prefix: ""
