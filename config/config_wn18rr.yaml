test_batch_size: 256
dataset: wn18rr
task: all
DirectAUKG:
  optimizer: Adagrad
  learning_rate: 0.01
  dim: 384
  gamma: 1.0
  encoder_name: sentence-transformers/all-MiniLM-L6-v2
  max_length: 32
  encode_batch_size: 4
  compose_mode: add
  n_epoch: 10
  n_batch: 85
  grad_accum_steps: 2
  amp: true
  amp_dtype: fp16
  gradient_checkpointing: true
  freeze_embeddings: false
  freeze_lower_layers: 4
  freeze_tail_encoder: false
  uniformity_max_samples: 64
  uniformity_chunk_size: 128
  forward_chunk_size: 32768
  epoch_per_test: 5
  model_file: DirectAUKG.mdl
TransE:
  optimizer: Adagrad
  learning_rate: 0.01
  dim: 50
  margin: 3
  p: 1
  temp: 1
  n_epoch: 1000
  n_batch: 100
  epoch_per_test: 50
  model_file: TransE.mdl
log:
  dump_config: false
  to_file: true
  dir: ./log
  prefix: ""